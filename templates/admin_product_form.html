<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ action }} Product – ShopWave Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body style="background:#f0f2ff">

<nav class="navbar admin-nav navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}">🛡️ ShopWave Admin</a>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-sm btn-outline-light ms-auto">
      <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
    </a>
  </div>
</nav>

<section class="page-wrapper">
  <div class="container" style="max-width:760px">

    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ 'danger' if cat == 'danger' else 'success' }} alert-dismissible fade show">
      {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    <div class="form-card">
      <h2 class="admin-section-title mb-4">
        <i class="bi bi-{{ 'plus-circle' if action == 'Add' else 'pencil-square' }} me-2"></i>
        {{ action }} Product
      </h2>

      <form action="{{ url_for('admin_add_product') if action == 'Add' else url_for('admin_edit_product', product_id=product.id) }}"
            method="post" id="productForm">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label" for="name">Product Name *</label>
            <input type="text" class="form-control" id="name" name="name"
                   value="{{ product.name if product else '' }}"
                   placeholder="e.g. Wireless Noise-Cancelling Headphones" required/>
          </div>

          <div class="col-sm-6">
            <label class="form-label" for="price">Price ($) *</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" step="0.01" min="0.01" class="form-control" id="price" name="price"
                     value="{{ product.price if product else '' }}" placeholder="29.99" required/>
            </div>
          </div>

          <div class="col-sm-6">
            <label class="form-label" for="stock">Stock Quantity *</label>
            <input type="number" min="0" class="form-control" id="stock" name="stock"
                   value="{{ product.stock if product else 0 }}" required/>
          </div>

          <div class="col-12">
            <label class="form-label" for="image_url">Image URL</label>
            <input type="url" class="form-control" id="image_url" name="image_url"
                   value="{{ product.image_url if product else '' }}"
                   placeholder="https://images.unsplash.com/..."
                   oninput="previewImage(this.value)"/>
            <div class="mt-3">
              <img id="imgPreview"
                   src="{{ product.image_url if product and product.image_url else '' }}"
                   alt="Preview" class="img-preview"
                   style="{{ 'display:block' if product and product.image_url else 'display:none' }}"/>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4"
                      placeholder="Write a compelling product description…">{{ product.description if product else '' }}</textarea>
          </div>
        </div>

        <hr class="my-4"/>

        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
            <i class="bi bi-{{ 'plus-circle' if action == 'Add' else 'check-circle' }} me-2"></i>
            {{ action }} Product
          </button>
          <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-lg">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function previewImage(url) {
  const img = document.getElementById('imgPreview');
  if (url) {
    img.src = url;
    img.style.display = 'block';
    img.onerror = () => { img.style.display = 'none'; };
  } else {
    img.style.display = 'none';
  }
}
</script>
</body>
</html>
